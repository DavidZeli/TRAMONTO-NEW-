body:before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:46px 46px;
    opacity:.55;
}
.app-container{
    width:100%;
    max-width:520px;
    margin:auto;
    min-height:100vh;
    padding:22px 18px 110px;
    position:relative;
}
.screen{display:none;animation:fadeIn .42s ease}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(14px);filter:blur(4px)}
    to{opacity:1;transform:translateY(0);filter:blur(0)}
}
h1,h2,h3{font-family:'Playfair Display',serif;font-style:italic}
.logo-box{text-align:center;margin-top:82px;margin-bottom:36px}
.logo-line{width:92px;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);margin:0 auto 18px}
.brand{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:34px;
    letter-spacing:2px;
    color:var(--gold2);
    text-shadow:0 8px 25px rgba(0,0,0,.7);
}
.brand-sub{
    margin-top:8px;
    font-size:11px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--muted);
}
.main-title{
    text-align:center;
    margin-top:35px;
    font-size:46px;
    letter-spacing:1px;
    color:var(--gold2);
    text-shadow:0 15px 30px rgba(0,0,0,.55);
}
.subtitle{
    text-align:center;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:5px;
    color:var(--muted);
    margin:8px 0 36px;
}
.menu-btn{
    width:100%;
    padding:20px 20px;
    margin-bottom:15px;
    background:linear-gradient(145deg,rgba(255,255,255,.105),rgba(255,255,255,.035));
    border:1px solid var(--line);
    border-radius:22px;
    color:var(--text);
    font-family:'Montserrat',sans-serif;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:.28s ease;
    box-shadow:0 16px 34px rgba(0,0,0,.28);
    backdrop-filter:blur(12px);
}
.menu-btn:hover{transform:translateY(-2px);border-color:rgba(241,210,138,.75);background:linear-gradient(145deg,rgba(197,160,89,.18),rgba(255,255,255,.04))}
.menu-btn:active{transform:scale(.97)}
.menu-btn .label{display:flex;flex-direction:column;text-align:left}
.menu-btn .label b{font-size:17px;letter-spacing:.7px;margin-bottom:5px}
.menu-btn .label span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.7px}
.lang-btn{
    justify-content:center;
    padding:21px 22px;
    text-align:center;
}
.lang-btn .label{
    width:100%;
    align-items:center;
    text-align:center;
}
.lang-btn .label b{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:25px;
    font-weight:700;
    letter-spacing:1.4px;
    color:var(--gold2);
    margin:0;
    text-shadow:0 8px 22px rgba(0,0,0,.55);
}
.lang-btn .icon{
    display:none;
}
.icon{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:rgba(197,160,89,.14);
    color:var(--gold2);
    font-size:18px;
    border:1px solid rgba(197,160,89,.25);
}
#btn-review{border-color:rgba(0,229,255,.65);background:rgba(0,229,255,.045)}
#btn-review .icon,#btn-review b{color:var(--blue)}
.category-header{
    font-size:36px;
    color:var(--gold2);
    margin:25px 0 26px;
    text-align:center;
}
.search{
    width:100%;
    margin-bottom:18px;
    padding:15px 17px;
    border-radius:18px;
    border:1px solid var(--line);
    color:var(--text);
    background:rgba(0,0,0,.35);
    outline:none;
    font-family:'Montserrat',sans-serif;
}
.food-item{
    display:flex;
    align-items:center;
    gap:13px;
    padding:14px;
    border:1px solid rgba(255,255,255,.07);
    background:linear-gradient(145deg,rgba(255,255,255,.082),rgba(0,0,0,.23));
    border-radius:20px;
    margin-bottom:12px;
    cursor:pointer;
    transition:.25s ease;
    box-shadow:0 12px 28px rgba(0,0,0,.21);
    backdrop-filter:blur(10px);
}
.food-item:active{transform:scale(.98)}
.food-img{
    width:70px;height:70px;border-radius:17px;
    object-fit:cover;flex-shrink:0;

function isSpecialName(sr){
    return specialTerms.some(term => String(sr).toLowerCase().includes(String(term).toLowerCase()));
}

function T(sr, en, ru, old4, old5){
    const extra = nameTranslations[sr] || {};
    return {sr:sr,en:extra.en||en||sr,ru:extra.ru||ru||extra.en||en||sr,tr:extra.tr||en||sr,zh:extra.zh||en||sr};
}
function desc(sr){
    let d = descTranslations[sr] || {};
    return {sr:sr,en:d.en||sr,ru:d.ru||d.en||sr,tr:d.tr||d.en||sr,zh:d.zh||d.en||sr};
}
function foreignDesc(en, ru, tr, zh){
    return {sr:"",en,ru:ru||en,tr:tr||en,zh:zh||en};
}
function item(name, description, price, icon="🍽️", img="", special=false){
    const translatedDescription = description ? (typeof description === "object" ? description : desc(description)) : null;
    return {name, desc: translatedDescription, price, icon, img, special: special || isSpecialName(name.sr)};
}
function simple(sr,en,ru,old4,old5,price,icon="🍽️",description=""){
    return item(T(sr,en,ru,old4,old5), description, price, icon, "", isSpecialName(sr));
}
function drink(sr, price, icon="🥂"){
    const translatedName = T(sr,sr,sr,sr,sr);
    const dd = drinkDescriptions[sr];
    return {name: translatedName, desc: dd ? foreignDesc(dd.en,dd.ru,dd.tr,dd.zh) : null, price, icon, img:"", special: !!dd || isSpecialName(sr)};
}

function getText(obj){
    if(!obj) return "";
    if(Object.prototype.hasOwnProperty.call(obj, lang)) return obj[lang];
    return obj.en || obj.sr || "";
}
function hideAll(){
    document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
    window.scrollTo(0,0);
}

function showOnly(screenId){
    document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
    const el=document.getElementById(screenId);
    if(el) el.style.display="block";
    window.scrollTo(0,0);
}

function makeAppState(screen, catKey){
    return {app:true, screen:screen, lang:lang, catKey:catKey || currentCategory || null};
}

function pushAppState(screen, catKey){
    const state=makeAppState(screen, catKey);
    history.pushState(state, "", "#" + screen);
    renderAppState(state);
}

function appBack(){
    history.back();
}

function renderAppState(state){
    if(!state || !state.app) state={app:true, screen:"lang", lang:lang, catKey:null};

    const modal=document.getElementById("item-modal");
    if(modal) modal.style.display="none";

    if(state.lang && content[state.lang]){
        lang=state.lang;
        document.documentElement.lang=lang;
    }

    if(state.screen==="lang"){
        showOnly("screen-lang");
        return;
    }

    if(state.screen==="home"){
        showOnly("screen-home");
        return;
    }

    if(state.screen==="categories"){
        document.getElementById("cat-title").innerText=content[lang].catTitle;
        document.getElementById("cat-search").value="";
        renderCategories();
        showOnly("screen-categories");
        return;
    }

    if(state.screen==="items"){
        currentCategory=state.catKey || currentCategory;
        if(currentCategory && fullMenu[currentCategory]){
            document.getElementById("item-cat-title").innerText=getText(fullMenu[currentCategory].title);
            document.getElementById("item-search").value="";
            renderItems();
            showOnly("screen-items");
        }else{
            document.getElementById("cat-title").innerText=content[lang].catTitle;
            renderCategories();
            showOnly("screen-categories");
        }
        return;
    }

    if(state.screen==="modal"){
        showOnly("screen-items");
        return;
    }

    showOnly("screen-lang");
}
function showLangScreen(){
    pushAppState("lang", null);
}
function setLang(l){
    lang=l;
    document.documentElement.lang=l;
    document.getElementById("home-welcome").innerText=content[lang].welcome;
    document.getElementById("home-sub").innerText=content[lang].sub;
    document.getElementById("lbl-menu").innerText=content[lang].menu;
    document.getElementById("sub-menu").innerText=content[lang].menuSub;
    document.getElementById("lbl-res").innerText=content[lang].res;
    document.getElementById("sub-res").innerText=content[lang].resSub;
    document.getElementById("lbl-review").innerText=content[lang].rev;
    document.getElementById("sub-review").innerText=content[lang].revSub;
    document.getElementById("back-lang").innerText=content[lang].back;
    document.getElementById("back-cat").innerText=content[lang].back;
    document.getElementById("back-items").innerText=content[lang].backToMenu;
    document.getElementById("cat-search").placeholder=content[lang].search;
    document.getElementById("item-search").placeholder=content[lang].search;
    document.getElementById("tap-note").innerText=content[lang].tap;
    document.getElementById("modal-close").innerText=content[lang].close;
    document.getElementById("footer-premium").innerText=content[lang].footerPremium;
    document.getElementById("footer-info-text").innerText=content[lang].footerInfo;
    pushAppState("home", null);
}
function goHome(){
    pushAppState("home", null);
}
function showMenu(){
    pushAppState("categories", null);
}
function renderCategories(){
    const q=document.getElementById("cat-search").value.toLowerCase().trim();
    const list=document.getElementById("categories-list");
    list.innerHTML="";
    Object.keys(fullMenu).forEach(key=>{
        const title=getText(fullMenu[key].title);
        if(q && !title.toLowerCase().includes(q)) return;
        const btn=document.createElement("button");
        btn.className="menu-btn";
        btn.onclick=()=>showItems(key);
        btn.innerHTML=`<div class="label"><b>${title}</b><span>${content[lang].view}</span></div><div class="icon">→</div>`;
        list.appendChild(btn);
    });
}
function showItems(catKey){
    currentCategory=catKey;
    pushAppState("items", catKey);
}
function priceText(price){
    if(String(price).includes("/")) return price + " RSD";
    return price + " RSD";
}
function renderItems(){
    const cat=fullMenu[currentCategory];
    const q=document.getElementById("item-search").value.toLowerCase().trim();
    const list=document.getElementById("items-list");
    list.innerHTML="";
    cat.items.forEach((it,idx)=>{
        const n=getText(it.name);
        const d=it.desc ? getText(it.desc) : "";
        const search=(n+" "+d+" "+it.price).toLowerCase();
        if(q && !search.includes(q)) return;
        const card=document.createElement("div");
        card.className="food-item" + ((it.special && lang !== "sr") ? " special-item" : "");
        card.onclick=()=>openItem(it);
        card.innerHTML=`
            <div class="food-img">${it.img ? `<img src="${it.img}" alt="${n}">` : it.icon}</div>
            <div class="food-info">
                <h4>${n}</h4>
                ${d ? `<p>${d}</p>` : ""}
            </div>
            <div class="food-price">${it.price}<small>RSD</small></div>
        `;
        list.appendChild(card);
    });
}
function openItem(it){
    const n=getText(it.name);
    const d=it.desc ? getText(it.desc) : "";
    const descBox=document.getElementById("modal-desc");
    document.getElementById("modal-title").innerText=n;
    descBox.innerText=d;
    descBox.style.display=d ? "block" : "none";
    document.getElementById("modal-price").innerText=priceText(it.price);
    document.getElementById("modal-img").innerHTML=it.img ? `<img src="${it.img}" alt="${n}">` : it.icon;
    document.getElementById("item-modal").style.display="flex";
    history.pushState({app:true, screen:"modal", lang:lang, catKey:currentCategory}, "", "#modal");
}
function hideModal(){
    const modal=document.getElementById("item-modal");
    if(modal && modal.style.display==="flex" && history.state && history.state.app && history.state.screen==="modal"){
        history.back();
    }else if(modal){
        modal.style.display="none";
    }
}
